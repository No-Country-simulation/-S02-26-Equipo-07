version: '3.8'

services:
  backend:
    image: ${DOCKER_USERNAME}/ecomerse_backend:main
    container_name: ecomerse_backend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      # JWT Configuration
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ISSUER=${JWT_ISSUER:-WebApi}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-WebApiClient}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-24}
      
      # Database Configuration
      - DB_CONNECTION_STRING=${DB_CONNECTION_STRING}
      
      # CORS Configuration
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      
      # Environment
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
    
    # Optional: Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Optional: Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Optional: Networks
networks:
  default:
    name: ecomerse_network
